
name: Android Release
on:
  push:
    tags: ['v*.*.*']  # Triggers on v1.2.3 tags

jobs:
  release:
    runs-on: ubuntu-latest  # GitHub cloud runner
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3  # Installs SDK tools^3^

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Decode signing keystore
      run: echo "${{ secrets.ENCODED_KEYSTORE }}" | base64 -d > keystore.jks
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

    - name: Build & sign release APK
      working-directory: android
      run: ./gradlew assembleRelease
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

    - name: Verify APK
      run: |
        zipalign -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk app-release.apk
        apksigner verify --print-certs app-release.apk

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: app-release.apk
        generate_release_notes: true
